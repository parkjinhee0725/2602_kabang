<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 폰트어썸 불러오기 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- 제이쿼리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


<!-- 슬릭 슬라이더 불러오기 -->
<!-- 무조건 제이쿼리 밑에다 놔야함 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
</head>
<body>
  <body>
	

               <style>
		/* 노말라이즈 */
		body,
		ul,
		li {
			margin: 0;
			padding: 0;
			list-style: none;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		/* 라이브러리 */
		.border-red {
			border: 4px solid red;
		}

		.border-pink {
			border: 4px solid pink;
		}

		.border-blue {
			border: 4px solid blue;
		}

		.border-green {
			border: 4px solid green;
		}

		.border-black {
			border: 4px solid black;
		}

		.border-gold {
			border: 4px solid gold;
		}

		.flex {
			display: flex;
		}

		.flex-jc-e {
			justify-content: flex-end;
		}

		.flex-jc-s {
			justify-content: flex-start;
		}

		.flex-jc-c {
			justify-content: center;
		}

		.flex-jc-sb {
			justify-content: space-between;
		}

		.flex-ai-c {
			align-items: center;
		}

		.flex-as-c {
			align-self: center;
		}

		.flex-grow-1 {
			flex-grow: 1;
		}

		.height-100p {
			height: 100%;
		}

		.block {
			display: block;
		}

		.con {
			margin-left: auto;
			margin-right: auto;
		}

		.img-box>img {
			width: 100%;
			display: block;
		}

		.relative {
			position: relative;
		}

		/* 커스텀 */
		.con {
			width: 1080px;
		}

		.con-min-width {
			min-width: 1080px;
		}

		::selection {
			background-color: #ffe100;
		}

		/* 체크카드 시작 */
		.checkcard_box{
			padding-top: 150px;
			padding-bottom: 120px;

		}

		.checkcard_box h3{
			font-size: 40px;
			line-height: 1.35;
			color:#111;
			margin: 0;
			text-align: center;
			
		}

			.checkcard_box p{
			font-size: 15px;
			line-height: 1.7;
			color:#666;
			margin-top: 24px;
			text-align: center;
			
		}

		.checkcard_box .btn_box{
			display: flex;
			justify-content: center;
			margin-top: 30px;
		}

		.checkcard_box .btn_box > a{
			width: 258px;
			height: 56px;
			background-color: #f6f6f6;
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 16px;
			line-height: 56px;
			color:#333;
			border-radius: 10px;
		}

		.checkcard_box .btn_box > a:hover{
			text-decoration: underline;
		}

		.checkcard_box .btn_box > a > img{
			width: 6px;
			height: 9px;
			margin: 1px 0 0 8px;
			display: block;
		}

		.checkcard_box .slider_box{
			position: relative;
			width: 660px;
			margin: 75px auto 0 auto;
		}

		.checkcard_box .slider_box > .arrows > div{
			position: absolute;
			top:50%;
			transform: translateY(-50%);
			right: calc(100% + 170px);
			cursor: pointer;
		}

		.checkcard_box .slider_box > .arrows > div:last-child{
			left: calc(100% + 170px);
			right: auto;
		}

		.checkcard_box .slider_box .slick .item.slick-center{
			transform: scale(1.25);
		}

		.checkcard_box .slider_box .slick .item > .img-box{
			padding-block: 45px;
		}






		
		/* 체크카드 끝 */
	</style>

	<script>
		function SliderBox1__init() {
  $('.slider_box > .slick').slick({
    slidesToShow: 3,
    slidesToScroll: 1,
    centerMode:true,
    centerPadding:0,
    arrows:true,
	prevArrow: ".slider_box > .arrows > .btn_arrow_left",
	nextArrow: ".slider_box > .arrows > .btn_arrow_right",
  });
}

SliderBox1__init();
	</script>
</body>
</html>
