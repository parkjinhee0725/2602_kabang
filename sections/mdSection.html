        <style>
		/* 노말라이즈 */
		body,
		ul,
		li {
			margin: 0;
			padding: 0;
			list-style: none;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		/* 라이브러리 */
		.border-red {
			border: 4px solid red;
		}

		.border-pink {
			border: 4px solid pink;
		}

		.border-blue {
			border: 4px solid blue;
		}

		.border-green {
			border: 4px solid green;
		}

		.border-black {
			border: 4px solid black;
		}

		.border-gold {
			border: 4px solid gold;
		}

		.flex {
			display: flex;
		}

		.flex-jc-e {
			justify-content: flex-end;
		}

		.flex-jc-s {
			justify-content: flex-start;
		}

		.flex-jc-c {
			justify-content: center;
		}

		.flex-jc-sb {
			justify-content: space-between;
		}

		.flex-ai-c {
			align-items: center;
		}

		.flex-as-c {
			align-self: center;
		}

		.flex-grow-1 {
			flex-grow: 1;
		}

		.height-100p {
			height: 100%;
		}

		.block {
			display: block;
		}

		.con {
			margin-left: auto;
			margin-right: auto;
		}

		.img-box>img {
			width: 100%;
			display: block;
		}

		.relative {
			position: relative;
		}

			width: 1080px;
		}

		.con-min-width {
			min-width: 1080px;
		}

		::selection {
			background-color: #ffe100;
		}

		/* ------------- 메인 배너 시작 ------------- */
        .main_banner {
            position: relative;
        }

		.main_banner > .banner_img {
			width: 1200px;
		}

        .main_banner > .bg {
            position: absolute;
            top: 0;
